services:
  qq-farm-bot-ui:
    image: ${DOCKERHUB_USERNAME:-your-username}/qq-farm-bot-ui:latest
    container_name: qq-farm-bot-ui
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      TZ: Asia/Shanghai
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/core/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s